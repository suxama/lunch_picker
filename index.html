<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종각역 점심 추천기</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --accent: #ff6b35;
    --accent2: #ff9500;
    --green: #34c759;
    --red: #ff3b30;
    --text: #f0f0f5;
    --subtext: #8e8ea0;
    --border: #2e2e3e;
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Pretendard", "Noto Sans KR", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header { text-align: center; margin-bottom: 36px; }
  header .emoji { font-size: 52px; line-height: 1; margin-bottom: 12px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  header p  { color: var(--subtext); font-size: 13px; margin-top: 6px; }
  .badge {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--subtext);
    margin-top: 10px;
  }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 28px; }
  .filter-btn {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--subtext);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  .card-wrap {
    width: 100%;
    max-width: 520px;
    min-height: 280px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px 28px;
  }
  .card.flip { animation: flipIn .5s cubic-bezier(.34,1.3,.64,1) both; }
  @keyframes flipIn {
    0%   { transform: rotateY(90deg) scale(.9); opacity: 0; }
    100% { transform: rotateY(0deg)  scale(1);  opacity: 1; }
  }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .restaurant-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.3; max-width: 78%; }
  .open-badge {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0; margin-top: 4px;
  }
  .open-badge.open   { background: rgba(52,199,89,.15); color: var(--green); border: 1px solid rgba(52,199,89,.3); }
  .open-badge.closed { background: rgba(255,59,48,.12);  color: var(--red);   border: 1px solid rgba(255,59,48,.25); }

  .category-tag {
    display: inline-block;
    background: rgba(255,107,53,.15);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .info-item { display: flex; flex-direction: column; gap: 3px; }
  .info-label { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: .5px; }
  .info-value { font-size: 15px; font-weight: 600; }
  .stars { color: var(--accent2); }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }
  .address { font-size: 13px; color: var(--subtext); line-height: 1.5; margin-bottom: 14px; }
  .keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .keyword {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--subtext);
  }
  .diningcode-link {
    display: block; text-align: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px;
    font-size: 13px; color: var(--subtext); text-decoration: none;
    transition: all .2s;
  }
  .diningcode-link:hover { border-color: var(--accent); color: var(--accent); }

  .card.empty {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: var(--subtext);
    min-height: 200px; font-size: 15px;
  }
  .card.empty .big { font-size: 40px; }

  .pick-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 50px;
    padding: 16px 52px; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 24px rgba(255,107,53,.4);
    letter-spacing: -0.3px; margin-bottom: 40px;
  }
  .pick-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,53,.5); }
  .pick-btn:active { transform: scale(.96); }
  .pick-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .roulette-card {
    display: flex; align-items: center; justify-content: center;
    min-height: 280px;
  }
  .roulette-wrap { text-align: center; width: 100%; padding: 20px; }
  .roulette-label {
    font-size: 13px; color: var(--subtext); margin-bottom: 28px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .roulette-name {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    min-height: 44px; line-height: 1.3;
    transition: color .3s;
  }
  .roulette-cat {
    font-size: 13px; color: var(--subtext); margin-top: 10px; min-height: 20px;
  }
  @keyframes rouletteFlash {
    0%   { opacity: .2; transform: translateY(6px) scale(.95); }
    60%  { opacity: 1;  transform: translateY(-2px) scale(1.04); }
    100% { opacity: 1;  transform: translateY(0)    scale(1); }
  }
  .roulette-flash { animation: rouletteFlash .12s ease-out; }
  @keyframes rouletteLand {
    0%   { color: var(--text);   transform: scale(1); }
    40%  { color: var(--accent); transform: scale(1.12); }
    70%  { color: var(--accent); transform: scale(.97); }
    100% { color: var(--accent); transform: scale(1); }
  }
  .roulette-land { animation: rouletteLand .5s cubic-bezier(.34,1.3,.64,1) forwards; }

  .list-section { width: 100%; max-width: 520px; }
  .list-title {
    font-size: 13px; font-weight: 600; color: var(--subtext);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px;
  }
  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px;
    cursor: pointer; transition: border-color .2s;
  }
  .list-item:hover { border-color: var(--accent); }
  .list-rank { font-size: 12px; font-weight: 700; color: var(--subtext); width: 22px; text-align: center; flex-shrink: 0; }
  .list-rank.top3 { color: var(--accent2); }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-cat  { font-size: 11px; color: var(--subtext); margin-top: 2px; }
  .list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .list-score { font-size: 13px; font-weight: 700; color: var(--accent2); }
  .list-dist  { font-size: 11px; color: var(--subtext); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.open   { background: var(--green); }
  .dot.closed { background: var(--border); }

  .updated { color: var(--subtext); font-size: 11px; text-align: center; margin-top: 32px; }
</style>
</head>

<header>
  <div class="emoji">🍱</div>
  <h1>종각역 점심 추천기</h1>
  <p>다이닝코드 실시간 데이터</p>
  <div class="badge">반경 500m · 총 100개 · 영업 중 61개</div>
</header>

<div class="filter-bar">

<div class="card-wrap">

<div class="list-section">

</div>

<div class="updated" id="updated"></div>

})();

let filter = 'all';

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === f));
}

function getPool() {
  return filter === 'open'
    ? ALL.filter(r => r.open_status.includes('영업 중'))
    : ALL;
}

function pick() {
  const pool = getPool();
  if (!pool.length) { alert('해당 조건의 식당이 없습니다.'); return; }
  const finalPick = pool[Math.floor(Math.random() * pool.length)];
  const btn = document.querySelector('.pick-btn');
  btn.disabled = true;
  btn.textContent = '🎰 뽑는 중...';

  const el = document.getElementById('card');
  el.className = 'card roulette-card';
  el.innerHTML = `
    <div class="roulette-wrap">
      <div class="roulette-label">🎰 오늘의 점심은...</div>
      <div class="roulette-name" id="rouletteName">?</div>
      <div class="roulette-cat" id="rouletteCat"></div>
    </div>
  `;

  let count = 0;
  const totalSteps = 28;

  function spin() {
    const nameEl = document.getElementById('rouletteName');
    const catEl  = document.getElementById('rouletteCat');
    if (!nameEl) return;

    if (count >= totalSteps) {
      nameEl.textContent = finalPick.name;
      catEl.textContent  = finalPick.category || '';
      nameEl.classList.remove('roulette-flash');
      void nameEl.offsetWidth;
      nameEl.classList.add('roulette-land');
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '🎲 오늘의 점심 뽑기!';
        renderCard(finalPick);
      }, 700);
      return;
    }

    const r = pool[Math.floor(Math.random() * pool.length)];
    nameEl.textContent = r.name;
    catEl.textContent  = r.category || '';
    nameEl.classList.remove('roulette-flash');
    void nameEl.offsetWidth;
    nameEl.classList.add('roulette-flash');

    count++;
    const progress = count / totalSteps;
    const delay = 60 + progress * progress * 380;
    setTimeout(spin, delay);
  }

  spin();
}

function renderCard(r) {
  const isOpen  = r.open_status.includes('영업 중');
  const score   = r.user_score ? '⭐ ' + r.user_score : '-';
  const dcScore = r.score ? r.score + '점' : '-';
  const dist    = r.distance != null ? r.distance + 'm' : '-';
  const reviews = r.review_cnt ? r.review_cnt + '개' : '-';
  const kwHtml  = r.keywords.length
    ? r.keywords.map(k => `<span class="keyword">${k}</span>`).join('') : '';
  const rev     = r.latest_review;
  const revHtml = rev && rev.text
    ? `<div class="address" style="margin-top:10px">💬 <strong>${rev.user}</strong> (${rev.date}) — ${rev.text.slice(0, 80).replace(/\n/g, ' ')}…</div>`
    : '';
  const imgHtml = r.image
    ? `<img src="${r.image}" alt="${r.name}" style="width:100%;border-radius:12px;margin-bottom:14px;object-fit:cover;max-height:180px;">`
    : '';

  const el = document.getElementById('card');
  el.className = 'card';
  void el.offsetWidth; // reflow for animation restart
  el.className = 'card flip';
  el.innerHTML = `
    ${imgHtml}
    <div class="card-header">
      <div class="restaurant-name">${r.name}</div>
      <div class="open-badge ${isOpen ? 'open' : 'closed'}">${isOpen ? '영업 중' : '영업 종료'}</div>
    </div>
    ${r.category ? `<div class="category-tag">${r.category}${r.area ? ' · ' + r.area : ''}</div>` : ''}
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">평점</span>
        <span class="info-value stars">${score}</span>
      </div>
      <div class="info-item">
        <span class="info-label">다이닝코드</span>
        <span class="info-value">${dcScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">리뷰</span>
        <span class="info-value">${reviews}</span>
      </div>
      <div class="info-item">
        <span class="info-label">종각역에서</span>
        <span class="info-value">${dist}</span>
      </div>
      <div class="info-item">
        <span class="info-label">전화</span>
        <span class="info-value" style="font-size:13px">${r.phone || '-'}</span>
      </div>
    </div>
    <div class="divider"></div>
    ${r.address ? `<div class="address">📍 ${r.address}</div>` : ''}
    ${revHtml}
    ${kwHtml ? `<div class="keywords" style="margin-top:10px">${kwHtml}</div>` : ''}
    <a class="diningcode-link" href="${r.url}" target="_blank">다이닝코드에서 자세히 보기 →</a>
  `;
}

function renderTopList() {
  const top = [...ALL]
    .filter(r => r.distance <= 500)
    .sort((a, b) => b.composite - a.composite)
    .slice(0, 10);

  document.getElementById('topList').innerHTML = top.map((r, i) => {
    const isOpen = r.open_status.includes('영업 중');
    const dist   = r.distance != null ? r.distance + 'm' : '-';
    return `
      <div class="list-item" onclick='renderCard(${JSON.stringify(r)})'>
        <div class="list-rank ${i < 3 ? 'top3' : ''}">${i + 1}</div>
        <div class="dot ${isOpen ? 'open' : 'closed'}"></div>
        <div class="list-info">
          <div class="list-name">${r.name}</div>
          <div class="list-cat">${r.category}</div>
        </div>
        <div class="list-right">
          <div class="list-score">⭐ ${r.user_score}</div>
          <div class="list-dist">${dist}</div>
        </div>
      </div>`;
  }).join('');
}

renderTopList();

document.getElementById('updated').textContent = '데이터 기준: 2026년 3월 30일 10시 50분';
</script>
</body>
</html>
